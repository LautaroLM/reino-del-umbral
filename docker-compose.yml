services:
  postgres:
    image: postgres:16-alpine
    container_name: ao-postgres
    restart: unless-stopped
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER:-ao}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-ao_dev}
      POSTGRES_DB: ${DATABASE_NAME:-ao}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
