services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  game-server:
    build:
      context: .
      dockerfile: apps/game-server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 2567
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy

  web-portal:
    build:
      context: .
      dockerfile: apps/web-portal/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GAME_CLIENT_URL: ${VITE_GAME_CLIENT_URL}
    restart: unless-stopped
    depends_on:
      - game-server

  game-client:
    build:
      context: .
      dockerfile: apps/game-client/Dockerfile
      args:
        VITE_WS_URL: ${VITE_WS_URL}
    restart: unless-stopped
    depends_on:
      - game-server

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PORTAL_DOMAIN: ${PORTAL_DOMAIN}
      GAME_DOMAIN: ${GAME_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web-portal
      - game-client
      - game-server

volumes:
  pgdata:
  caddy_data:
  caddy_config:
