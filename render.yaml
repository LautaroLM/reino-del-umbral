services:
  - type: web
    name: reino-del-umbral-game-server
    runtime: docker
    plan: free
    dockerfilePath: ./apps/game-server/Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 2567
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
