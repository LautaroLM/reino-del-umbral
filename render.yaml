services:
  - type: web
    name: reino-del-umbral-game-server
    runtime: docker
    plan: free
    dockerfilePath: ./apps/game-server/Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ao/shared-types build && pnpm --filter @ao/shared-constants build && pnpm --filter @ao/shared-protocol build && pnpm --filter @ao/shared-utils build && pnpm --filter @ao/config build && pnpm --filter @ao/game-server build
    startCommand: pnpm --filter @ao/game-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 2567
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
